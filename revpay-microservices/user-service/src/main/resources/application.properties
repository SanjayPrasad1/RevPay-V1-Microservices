server.port=8081
spring.application.name=user-service

# DataSource ? own dedicated database
spring.datasource.url=jdbc:mysql://localhost:3306/revpay_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT ? must be same secret across all services so tokens are valid everywhere
app.jwt.secret=UmV2UGF5U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25NdXN0QmVBdExlYXN0MjU2Qml0c0xvbmc=
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS ? allow gateway + direct browser calls during dev
#app.cors.allowed-origins=http://localhost:4200

# Eureka
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.com.revpay=DEBUG
logging.level.org.springframework.security=WARN