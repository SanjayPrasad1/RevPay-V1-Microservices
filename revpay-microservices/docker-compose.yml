services:

  mysql:
    image: mysql:8.0
    container_name: revpay-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=rootpassword"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - mysql_data:/var/lib/mysql

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: revpay-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: revpay-user
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: revpay-notification
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile
    container_name: revpay-wallet
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      notification-service:
        condition: service_started

  invoice-service:
    build:
      context: ./invoice-service
      dockerfile: Dockerfile
    container_name: revpay-invoice
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      wallet-service:
        condition: service_started
      notification-service:
        condition: service_started

  loan-service:
    build:
      context: ./loan-service
      dockerfile: Dockerfile
    container_name: revpay-loan
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      wallet-service:
        condition: service_started
      notification-service:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: revpay-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      wallet-service:
        condition: service_started
      invoice-service:
        condition: service_started
      loan-service:
        condition: service_started
      notification-service:
        condition: service_started

  frontend:
    build:
      context: ../../cognizant-frontend/revpay_frontend
      dockerfile: Dockerfile
    container_name: revpay-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  mysql_data:
    driver: local